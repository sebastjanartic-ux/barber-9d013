<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLX NEWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --red: #e00;
            --dark: #111;
            --gray: #666;
            --light: #f5f5f5;
            --border: #e8e8e8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: var(--dark);
            padding-top: 112px; /* fixed header (64px) + nav (48px) */
        }

        /* HEADER */
        header {
            border-bottom: 3px solid var(--red);
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--dark);
            text-decoration: none;
            display: inline-block;
        }
        .logo span { color: var(--red); }
        .logo-sub {
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--gray);
            display: block;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: -2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }
        .date-badge {
            font-size: 0.8rem;
            color: var(--gray);
        }

        /* NAV TABS */
        .nav-tabs {
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            background: #ffffff;
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            z-index: 999;
        }
        body {
            padding-top: 112px;
        }
        .nav-tabs-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            gap: 0;
        }
        .tab {
            padding: 10px 18px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--gray);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            white-space: nowrap;
        }
        .tab.active {
            color: var(--dark);
            border-bottom-color: var(--red);
        }
        .tab:hover { color: var(--dark); }

        /* MAIN LAYOUT */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* SECTION */
        .section { display: none; }
        .section.active { display: block; }

        /* NEWS GRID */
        .featured-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }
        @media (max-width: 768px) {
            .featured-grid { grid-template-columns: 1fr; }
        }

        .featured-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }
        .featured-card img {
            width: 100%;
            height: 440px;
            object-fit: cover;
            object-position: center center;
            display: block;
        }
        .featured-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 30px 20px 20px;
            color: #fff;
        }
        .featured-card .tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff4444;
            margin-bottom: 8px;
        }
        .featured-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.35;
        }
        .featured-card .meta {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 6px;
        }

        .side-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .side-card {
            display: flex;
            gap: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .side-card:hover { background: var(--light); }
        .side-card img {
            width: 100px;
            height: 75px;
            object-fit: cover;
            object-position: center 20%;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .side-card-content {}
        .side-card .tag {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--red);
            letter-spacing: 0.8px;
        }
        .side-card h4 {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.35;
            margin-top: 4px;
            color: var(--dark);
        }
        .side-card .meta {
            font-size: 0.7rem;
            color: var(--gray);
            margin-top: 4px;
        }

        /* ALL NEWS LIST */
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gray);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .news-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .news-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .news-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .news-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: center center;
        }
        .news-card-body { padding: 14px; }
        .news-card .tag {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--red);
            letter-spacing: 0.8px;
        }
        .news-card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.35;
            margin-top: 6px;
            color: var(--dark);
        }
        .news-card .meta {
            font-size: 0.7rem;
            color: var(--gray);
            margin-top: 8px;
        }

        /* REELS SECTION */
        .reels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .reel-card {
            background: var(--dark);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 9/16;
            position: relative;
            cursor: pointer;
        }
        .reel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .reel-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        .reel-card .reel-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #fff;
            font-size: 0.75rem;
            line-height: 1.3;
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--border);
            padding: 20px;
            text-align: center;
            color: var(--gray);
            font-size: 0.8rem;
            margin-top: 60px;
        }
        .footer-logo { font-weight: 800; color: var(--dark); }
        .footer-logo span { color: var(--red); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff;
            max-width: 600px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
        }
        .modal img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }
        .modal-body { padding: 24px; }
        .modal-body .tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--red);
            letter-spacing: 1px;
        }
        .modal-body h2 { margin: 10px 0; font-size: 1.3rem; line-height: 1.4; }
        .modal-body p { color: #444; line-height: 1.6; font-size: 0.9rem; }
        .modal-body .fb-link {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 20px;
            background: #1877f2;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .modal-close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray);
            background: none;
            border: none;
            padding: 0 4px;
            line-height: 1;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 1.6rem;
            line-height: 1;
            color: var(--dark);
        }
        .hamburger span {
            width: 22px;
            height: 1.5px;
            background: var(--dark);
            display: block;
            transition: all 0.3s;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            background: #fff;
            border-bottom: 3px solid var(--red);
            z-index: 998;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .mobile-menu.open { display: flex; }
        .mobile-menu .tab {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .mobile-menu .tab.active {
            border-bottom-color: var(--border);
            color: var(--red);
        }
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-tabs { display: none; }
            body { padding-top: 70px; }
        }

        /* WEATHER TICKER - vertical flip */
        .weather-ticker {
            overflow: hidden;
            width: 120px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0 10px;
            display: flex;
            align-items: center;
            position: relative;
        }
        @media (max-width: 480px) { .weather-ticker { width: 100px; } }
        .ticker-flip {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--dark);
            white-space: nowrap;
            animation: flipUp 0.4s ease forwards;
        }
        @keyframes flipUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes flipOut {
            from { transform: translateY(0);     opacity: 1; }
            to   { transform: translateY(-100%); opacity: 0; }
        }
        .ticker-flip.out { animation: flipOut 0.3s ease forwards; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a class="logo" href="#">FOLX<span>NEWS</span><span class="logo-sub">Volksmusik & Schlager</span></a>
        <div style="display:flex;align-items:center;gap:12px">
            <div class="weather-ticker" id="weather-ticker">
                <div class="ticker-flip" id="ticker-flip">--</div>
            </div>
            <div class="date-badge" id="current-date"></div>
            <div class="hamburger" onclick="toggleMenu()" id="hamburger" style="font-size:1.4rem;font-weight:300;letter-spacing:-1px;color:var(--dark);cursor:pointer;user-select:none;">≡</div>
        </div>
    </div>
</header>

<div class="nav-tabs">
    <div class="nav-tabs-inner">
        <div class="tab active" onclick="showSection('news', this)">NEWS</div>
        <div class="tab" onclick="showSection('today', this)">Auf diesen Tag</div>
        <div class="tab" onclick="showSection('reels', this)">Reels</div>
    </div>
</div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobile-menu">
    <div class="tab active" onclick="showSection('news', this); closeMenu()">NEWS</div>
    <div class="tab" onclick="showSection('today', this); closeMenu()">Auf diesen Tag</div>
    <div class="tab" onclick="showSection('reels', this); closeMenu()">Reels</div>
</div>

<div class="container">
    <!-- NEWS SECTION -->
    <div class="section active" id="section-news">
        <div id="featured-area">

        </div>
        <p class="section-title">Alle News</p>
        <div class="news-list" id="news-list"></div>
    </div>

    <!-- TODAY SECTION -->
    <div class="section" id="section-today">
        <p class="section-title">Auf diesen Tag</p>
        <div class="news-list" id="today-list">
            <div class="loading"><div class="spinner"></div>Wird geladen...</div>
        </div>
    </div>

    <!-- REELS SECTION -->
    <div class="section" id="section-reels">
        <p class="section-title">Reels</p>
        <div class="reels-grid" id="reels-list">
            <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Reels werden geladen...</div>
        </div>
    </div>
</div>

<footer>
    <div class="footer-logo">FOLX<span>NEWS</span></div>
    <p>© FOLX MUSIC Television — Volksmusik & Schlager</p>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" id="modal-content">
        <div class="modal-body">
            <button class="modal-close" onclick="closeModalBtn()">✕</button>
            <div class="tag" id="modal-tag"></div>
            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>
            <a class="fb-link" id="modal-link" href="#" target="_blank">Auf Facebook ansehen →</a>
        </div>
    </div>
</div>

function formatDate(dt) {
    const d = new Date(dt);
    return d.toLocaleDateString('de-DE', {day:'numeric', month:'long', year:'numeric'});
}

function shortMsg(msg, len=80) {
    if (!msg) return '';
    let clean = msg;
    // Remove FOLX NEWS header line (📰 FOLX NEWS – DD.MM.YYYY | HH:MM 📰)
    // Remove FOLX NEWS header line
    clean = clean.replace(/[📰]?\s*FOLX NEWS\s*[–\-]+\s*[\d.]+\s*[|]\s*[\d:]+\s*[📰]?\n?/gi, '');
    clean = clean.replace(/[📰]?\s*NOVICE FOLX\s*[–\-]+\s*[\d.]+\s*[|]\s*[\d:]+\s*[📰]?\n?/gi, '');
    // Remove newspaper emoji header
    clean = clean.replace(/^[\s🗞️📰]+FOLX NEWS[^\n]*\n?/gim, '');
    // Remove hashtags and extra whitespace
    clean = clean.replace(/#\w+/g, '').trim();
    // Normalize slovenian months
    clean = clean.replace(/\bmarc\b/gi, 'März').replace(/\bmarec\b/gi, 'März');
    // If nothing left after cleaning, use original truncated
    if (clean.length < 5) clean = msg.replace(/#\w+/g, '').trim();
    return clean.length > len ? clean.slice(0, len) + '...' : clean;
}

function renderFeatured(posts) {
    if (!posts.length) { document.getElementById('featured-area').innerHTML = ''; return; }
    const main = posts[0];
    const sides = posts.slice(1, 5);
    
    let sidesHtml = sides.map(p => `
        <div class="side-card" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
            <img src="${p.full_picture || ''}" alt="" onerror="this.style.display='none'">
            <div class="side-card-content">
                <div class="tag">FOLX NEWS</div>
                <h4>${shortMsg(p.message, 70)}</h4>
                <div class="meta">${formatDate(p.created_time)}</div>
            </div>
        </div>`).join('');
    
    document.getElementById('featured-area').innerHTML = `
        <div class="featured-grid">
            <div class="featured-card" onclick="openModal(${JSON.stringify(main).replace(/"/g,'&quot;')})">
                <img src="${main.full_picture || ''}" alt="">
                <div class="overlay">
                    <div class="tag">FOLX NEWS</div>
                    <h2>${shortMsg(main.message, 100)}</h2>
                    <div class="meta">${formatDate(main.created_time)}</div>
                </div>
            </div>
            <div class="side-cards">${sidesHtml}</div>
        </div>`;
}

function renderNewsList(posts) {
    if (!posts.length) { document.getElementById('news-list').innerHTML = ''; return; }
    document.getElementById('news-list').innerHTML = posts.slice(4).map(p => `
        <div class="news-card" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
            <img src="${p.full_picture || ''}" alt="" onerror="this.style.background='#f0f0f0'">
            <div class="news-card-body">
                <div class="tag">FOLX NEWS</div>
                <h3>${shortMsg(p.message, 80)}</h3>
                <div class="meta">${formatDate(p.created_time)}</div>
            </div>
        </div>`).join('');
}

function renderToday(posts) {
    const el = document.getElementById('today-list');
    if (!posts.length) { el.innerHTML = '<div class="loading">Keine Beiträge für heute.</div>'; return; }
    el.innerHTML = posts.map(p => `
        <div class="news-card" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
            <img src="${p.full_picture || ''}" alt="" onerror="this.style.background='#f0f0f0'">
            <div class="news-card-body">
                <div class="tag">Auf diesen Tag</div>
                <h3>${shortMsg(p.message, 100)}</h3>
                <div class="meta">${formatDate(p.created_time)}</div>
            </div>
        </div>`).join('');
}

function renderReels(posts) {
    const el = document.getElementById('reels-list');
    if (!posts.length) { el.innerHTML = '<div class="loading" style="grid-column:1/-1">Keine Reels für heute.</div>'; return; }
    el.innerHTML = posts.map(p => `
        <div class="reel-card" onclick="window.open('${p.permalink_url}','_blank')">
            <img src="${p.full_picture || ''}" alt="" onerror="this.style.background='#222'">
            <div class="reel-play">▶</div>
            <div class="reel-text">${shortMsg(p.message, 60)}</div>
        </div>`).join('');
}

function openModal(post) {
    const m = document.getElementById('modal');
    const mc = document.getElementById('modal-content');
    
    const tag = post.type === 'today' ? 'Auf diesen Tag' : post.type === 'reel' ? 'Reel' : 'FOLX NEWS';
    
    mc.innerHTML = `
        ${post.full_picture ? `<img src="${post.full_picture}" alt="">` : ''}
        <div class="modal-body">
            <button class="modal-close" onclick="closeModalBtn()">✕</button>
            <div class="tag">${tag}</div>
            <h2>${formatDate(post.created_time)}</h2>
            <p>${(post.message || '').replace(/\n/g, '<br>')}</p>
            <a class="fb-link" href="${post.permalink_url || '#'}" target="_blank">Auf Facebook ansehen →</a>
        </div>`;
    
    m.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModalBtn() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
}
function closeModal(e) {
    if (e.target.id === 'modal') closeModalBtn();
}

async function refreshWeather() {
    try {
        // IP geolocation - no permission needed, with timeout
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 4000);
        
        const geo = await fetch('https://ipapi.co/json/', {signal: controller.signal});
        clearTimeout(timeout);
        const loc = await geo.json();
        const city = loc.city || loc.region || '';
        const lat = loc.latitude;
        const lon = loc.longitude;
        
        // Get weather
        const controller2 = new AbortController();
        const timeout2 = setTimeout(() => controller2.abort(), 4000);
        const r = await fetch(`https://wttr.in/${lat},${lon}?format=j1`, {signal: controller2.signal});
        clearTimeout(timeout2);
        const d = await r.json();
        const cur = d.current_condition[0];
        const temp = cur.temp_C;
        const desc = cur.weatherDesc[0].value;
        const icon = Object.entries(weatherIcons).find(([k]) => desc.toLowerCase().includes(k.toLowerCase()))?.[1] || '🌡️';
        
        // Build flip ticker items
        const getTime = () => new Date().toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'});
        const flipItems = [
            () => icon + ' ' + temp + '°C',
            () => '📍 ' + city,
            () => '🕐 ' + getTime()
        ];
        let flipIdx = 0;
        const flipEl = document.getElementById('ticker-flip');
        
        function showNext() {
            flipEl.classList.add('out');
            setTimeout(() => {
                flipIdx = (flipIdx + 1) % flipItems.length;
                flipEl.textContent = flipItems[flipIdx]();
                flipEl.classList.remove('out');
                flipEl.style.animation = 'none';
                flipEl.offsetHeight; // reflow
                flipEl.style.animation = '';
            }, 300);
        }
        
        // Show first item
        flipEl.textContent = flipItems[0]();
        // Rotate every 3 seconds
        setInterval(showNext, 3000);
        
    } catch(e) {
        const flipEl2 = document.getElementById('ticker-flip');
        if (flipEl2) {
            flipEl2.textContent = '🕐 ' + new Date().toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'});
        }
    }
}

// Auto-load on start — no click needed, delay weather so page renders first
setTimeout(refreshWeather, 500);

// HAMBURGER
function toggleMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.toggle('open');
}
function closeMenu() {
    document.getElementById('mobile-menu').classList.remove('open');
}
// Update mobile menu active state  
function showSection(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('section-' + name).classList.add('active');
    // Sync mobile menu
    document.querySelectorAll('.mobile-menu .tab').forEach(t => {
        if (t.getAttribute('onclick') && t.getAttribute('onclick').includes("'" + name + "'")) {
            t.classList.add('active');
        }
    });
}
</script>
