<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folx TV Novice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #c8102e, #8b0000);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: 700;
        }
        header span {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .section-title {
            font-size: 1.3rem;
            color: #c8102e;
            border-left: 4px solid #c8102e;
            padding-left: 12px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .news-card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s;
            border: 1px solid #2a2a2a;
        }
        .news-card:hover { transform: translateY(-3px); }
        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .news-card .img-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .news-card .content {
            padding: 15px;
        }
        .news-card .date {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 8px;
        }
        .news-card h3 {
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .news-card p {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
            font-size: 1.1rem;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>🎵 FOLX TV NOVICE</h1>
            <span>Schlager & Volksmusik Nachrichten</span>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">📅 Na današnji dan</h2>
        <div class="news-grid" id="today-grid">
            <div class="loading">Naložujem...</div>
        </div>

        <h2 class="section-title">🎤 Šlager novice</h2>
        <div class="news-grid" id="news-grid">
            <div class="loading">Naložujem...</div>
        </div>
    </div>

    <footer>© Folx TV — Schlager & Volksmusik</footer>

    <script>
        // Placeholder - bo napolnjeno iz FB API
        document.getElementById('today-grid').innerHTML = `
            <div class="news-card">
                <div class="img-placeholder">🎵</div>
                <div class="content">
                    <div class="date">Danes · 20. März 2026</div>
                    <h3>Vsebina se nalaga...</h3>
                    <p>Novice iz Facebook strani Folx TV bodo kmalu tukaj.</p>
                </div>
            </div>`;
        document.getElementById('news-grid').innerHTML = `
            <div class="news-card">
                <div class="img-placeholder">🎶</div>
                <div class="content">
                    <div class="date">Diese Woche</div>
                    <h3>Schlager Nachrichten</h3>
                    <p>Aktuelle Neuigkeiten aus der Schlager- und Volksmusikwelt.</p>
                </div>
            </div>`;
    </script>
</body>
</html>
